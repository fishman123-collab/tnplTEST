<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>新總館志工「書香閱時光」平台</title>
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <style>
        :root { --primary-color: #00B900; --bg-color: #F4F7F6; --text-color: #333333; --secondary-text: #777777; --shadow: 0 4px 6px rgba(0,0,0,0.1); }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; margin: 0; padding: 0; background-color: var(--bg-color); color: var(--text-color); display: flex; justify-content: center; align-items: flex-start; min-height: 100vh; }
        .container { width: 100%; max-width: 500px; padding: 20px; box-sizing: border-box; }
        .header { text-align: center; margin-bottom: 20px; padding: 20px 0 10px; }
        .logo-placeholder { font-size: 40px; margin-bottom: 10px; }
        .header h1 { font-size: 22px; font-weight: 700; margin: 0; }
        .header p { font-size: 14px; margin: 5px 0 0; color: var(--secondary-text); }
        
        .section { display: none; }
        .section.active { display: block; animation: fadeIn 0.5s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* 綁定表單與打卡 UI (與上一版相同，簡化顯示) */
        .bind-card, .form-section, .profile-card { background: white; padding: 20px; border-radius: 16px; box-shadow: var(--shadow); margin-bottom: 20px; }
        .bind-input, select, input[type="text"], input[type="number"], input[type="datetime-local"] { width: 100%; padding: 12px; margin-top: 5px; margin-bottom: 15px; border: 1px solid #ccc; border-radius: 8px; font-size: 16px; box-sizing: border-box; }
        .bind-btn { background-color: var(--text-color); color: white; border: none; padding: 12px 30px; border-radius: 20px; font-size: 16px; cursor: pointer; width: 100%; font-weight: bold;}
        .checkin-btn { background-color: var(--primary-color); color: white; border: none; width: 150px; height: 150px; border-radius: 50%; font-size: 18px; font-weight: bold; cursor: pointer; box-shadow: 0 8px 15px rgba(0, 185, 0, 0.3); display: flex; flex-direction: column; justify-content: center; align-items: center; margin: 0 auto; }
        .status-area { background-color: #ffffff; border-radius: 12px; padding: 15px; box-shadow: var(--shadow); font-size: 14px; margin-top: 20px;}
        .profile-card { display: flex; align-items: center; }
        .profile-card img { width: 60px; height: 60px; border-radius: 50%; margin-right: 15px; }

        /* 館員後台專屬樣式 */
        .admin-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .admin-header h2 { margin: 0; font-size: 18px; }
        .refresh-btn { background: #eeeeee; border: none; padding: 8px 15px; border-radius: 15px; cursor: pointer; font-size: 14px; }
        
        .record-card { background: white; border-radius: 12px; padding: 15px; box-shadow: var(--shadow); margin-bottom: 15px; border-left: 5px solid #ffc107; }
        .record-card.sign-in { border-left-color: #00B900; }
        .record-card.sign-out { border-left-color: #ff4d4f; }
        
        .record-title { display: flex; justify-content: space-between; font-weight: bold; font-size: 16px; margin-bottom: 10px; }
        .record-tag { font-size: 12px; background: #eee; padding: 3px 8px; border-radius: 10px; }
        
        .approve-btn { background-color: var(--text-color); color: white; border: none; padding: 10px; border-radius: 8px; width: 100%; font-size: 16px; font-weight: bold; cursor: pointer; }

        /* 彈出視窗 */
        .result-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-color: rgba(0,0,0,0.7); display: flex; justify-content: center; align-items: center; opacity: 0; visibility: hidden; z-index: 1000; }
        .result-overlay.show { opacity: 1; visibility: visible; }
        .result-card { background-color: #ffffff; border-radius: 16px; padding: 30px; text-align: center; width: 80%; max-width: 320px; }
    </style>
</head>
<body>

    <div class="container">
        <div class="header">
            <div class="logo-placeholder">📍</div>
            <h1>新總館志工「書香閱時光」平台</h1>
            <p id="systemSubtitle">系統連線中...</p>
            <button id="sysAdminToggleBtn" onclick="toggleViewMode()" style="display:none; margin: 10px auto 0; background: #333; color: #fff; border: none; padding: 6px 15px; border-radius: 20px; font-size: 13px; font-weight:bold; cursor: pointer; box-shadow: 0 2px 5px rgba(0,0,0,0.2);">🔄 切換為志工視角</button>
        </div>

        <div id="sectionLoading" class="section active" style="text-align: center;">
            <p>正在驗證您的身分，請稍候 ⏳</p>
        </div>

        <div id="sectionBind" class="section">
            <div class="bind-card">
                <h2 style="margin-top:0;">身分驗證</h2>
                <input type="tel" id="phoneInput" class="bind-input" placeholder="請輸入建檔手機號碼" maxlength="10">
                <button id="bindBtn" class="bind-btn">立即綁定</button>
            </div>
        </div>

        <div id="sectionCheckIn" class="section">
            <div class="profile-card">
                <img src="" alt="頭像" id="userAvatar">
                <div class="profile-info">
                    <h2 id="userName">您好，志工</h2>
                    <p id="userRole"></p>
                </div>
            </div>
            <div class="form-section">
                <label style="font-weight: bold; display: block;">📋 服務內容：</label>
                <select id="serviceSelect">
                    </select>
                <label style="font-weight: bold; display: block; margin-top:10px;">⏱️ 打卡狀態：</label>
                <div style="display: flex; gap: 20px; margin-top: 5px;">
                    <label><input type="radio" name="checkType" value="簽到" checked> 簽到</label>
                    <label><input type="radio" name="checkType" value="簽退"> 簽退</label>
                </div>
            </div>
            <div class="action-card">
                <button class="checkin-btn" id="checkInBtn">
                    <span style="font-size: 40px;">📍</span>
                    <span id="checkInBtnText">點我打卡</span>
                </button>
            </div>
       <div class="status-area">
                <div style="font-weight: bold; margin-bottom: 10px; color: var(--secondary-text);">📢 系統狀態</div>
                <div id="statusMsg">準備就緒。</div>
            </div>
            
            <button onclick="openRecordsUI()" style="margin-top: 15px; width: 100%; background: #e0f2f1; color: #00897b; border: none; padding: 12px; border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px;">
                <span>📊</span> 查詢我的服務紀錄
            </button>
            
            <button id="leaderQueryBtn" onclick="openAdminQueryUI('volunteer')" style="display:none; margin-top: 10px; width: 100%; background: #fff8e1; color: #f57f17; border: 1px solid #ffe082; padding: 12px; border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer; flex-direction: row; align-items: center; justify-content: center; gap: 8px;">
                <span>👑</span> 幹部差勤查詢系統
            </button>
        </div>
<div id="sectionRecords" class="section">
            <div style="display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px;">
                <button onclick="switchSection(document.getElementById('sectionCheckIn'))" style="background:none; border:none; font-size:16px; color:var(--primary-color); font-weight:bold; cursor:pointer;">⬅️ 返回打卡</button>
                <h2 style="margin:0; font-size: 18px;">我的服務紀錄</h2>
            </div>

            <div style="display: flex; gap: 10px; margin-bottom: 20px;">
                <button id="tabMonthly" onclick="switchRecordTab('monthly')" style="flex:1; padding:10px; border-radius:8px; border:none; background:var(--primary-color); color:white; font-weight:bold; cursor:pointer;">📅 單月明細</button>
                <button id="tabYearly" onclick="switchRecordTab('yearly')" style="flex:1; padding:10px; border-radius:8px; border:1px solid #ccc; background:white; color:var(--text-color); font-weight:bold; cursor:pointer;">📈 年度結算</button>
            </div>

            <div id="viewMonthly">
                <div style="background: white; padding: 15px; border-radius: 12px; box-shadow: var(--shadow); margin-bottom: 15px; text-align: center;">
                    <label style="font-weight:bold; display:block; margin-bottom:8px; color:var(--secondary-text);">選擇查詢月份：</label>
                    <input type="month" id="monthSelector" onchange="renderMonthlyRecords()" style="width: 100%; padding: 10px; border-radius: 8px; border: 1px solid #ccc; font-size: 16px; box-sizing:border-box;">
                    <div style="margin-top: 15px; padding-top: 15px; border-top: 1px dashed #eee;">
                        <span style="font-size: 14px; color: var(--secondary-text);">該月總計時數</span>
                        <div id="monthlyTotalHours" style="font-size: 28px; font-weight: bold; color: var(--primary-color);">0.0 <span style="font-size:16px;">小時</span></div>
                    </div>
                </div>
                <div id="monthlyListContainer"></div>
            </div>

            <div id="viewYearly" style="display:none;">
                <div style="background: white; padding: 15px; border-radius: 12px; box-shadow: var(--shadow); margin-bottom: 15px; text-align: center;">
                    <label style="font-weight:bold; display:block; margin-bottom:8px; color:var(--secondary-text);">選擇結算年度：</label>
                    <select id="yearSelector" onchange="renderYearlyRecords()" style="width: 100%; padding: 10px; border-radius: 8px; border: 1px solid #ccc; font-size: 16px; box-sizing:border-box;">
                        </select>
                    <div style="margin-top: 15px; padding-top: 15px; border-top: 1px dashed #eee;">
                        <span style="font-size: 14px; color: var(--secondary-text);">年度累積總計</span>
                        <div id="yearlyTotalHours" style="font-size: 28px; font-weight: bold; color: #d97706;">0.0 <span style="font-size:16px;">小時</span></div>
                    </div>
                </div>
                <div id="yearlyListContainer"></div>
            </div>
        </div>
        <div id="sectionAdmin" class="section">
            <div class="profile-card" style="margin-bottom: 15px; padding: 15px;">
                <div>
                    <h2 id="staffName" style="margin: 0; font-size: 18px;">館員您好</h2>
                    <p id="adminRole" style="margin: 3px 0 0; font-size: 13px; color: var(--secondary-text);">管理員模式已啟動</p>
                </div>
            </div>
            
               <div class="admin-header">
                <h2>📋 待審核清單</h2>
                <div style="display: flex; flex-wrap: wrap; gap: 5px; justify-content: flex-end;">
                    <button class="refresh-btn" id="btnBatchMode" onclick="toggleBatchMode()" style="background:#e3f2fd; color:#1565c0; font-weight:bold;">☑️ 批次審核</button>
                    
                    <button class="refresh-btn" id="btnToggleCultural" onclick="toggleCulturalMode()" style="background:#f3e5f5; color:#8e24aa; font-weight:bold;">🎭 文化時數</button>
                    <button class="refresh-btn" onclick="openManualEntryUI()" style="background:#fff3e0; color:#e65100; font-weight:bold;">➕ 補登</button>
                    <button class="refresh-btn" onclick="openAdminQueryUI()" style="background:#e0f2f1; color:#00897b; font-weight:bold;">📊 總查詢</button>
                    <button class="refresh-btn" onclick="fetchPendingRecords()">🔄 重整</button>
                </div>
            </div>

            <button id="submitBatchBtn" onclick="submitBatchApprove()" style="display:none; width:100%; padding:15px; font-size:16px; font-weight:bold; background:#00B900; color:white; border:none; border-radius:8px; margin-bottom:15px; box-shadow:0 4px 6px rgba(0,0,0,0.1); cursor:pointer;">
                ✅ 送出批次核准 (已選 0 筆)
            </button>
            

            <div id="adminRecordsContainer">
                <p style="text-align:center; color:gray;">載入資料中...</p>
            </div>
        </div>

        <div id="sectionAdminQuery" class="section">
            <div style="display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px;">
                <button id="adminQueryBackBtn" style="background:none; border:none; font-size:16px; color:var(--primary-color); font-weight:bold; cursor:pointer;">⬅️ 返回</button>
                <h2 style="margin:0; font-size: 18px;">差勤查詢系統</h2>
            </div>
            
            <div style="background: white; padding: 15px; border-radius: 12px; box-shadow: var(--shadow); margin-bottom: 15px;">
                
                <label style="font-weight:bold; display:block; margin-bottom:8px;">🔍 關鍵字搜尋：</label>
                <input type="text" id="adminSearchInput" oninput="updateVolSelector(); renderAdminQuery();" placeholder="可輸入姓名,職稱,電話,Email,LINE名" style="width: 100%; padding: 10px; border-radius: 8px; border: 1px solid #ccc; font-size: 16px; margin-bottom:15px; box-sizing:border-box;">

                <label style="font-weight:bold; display:block; margin-bottom:8px;">👥 選擇組別：</label>
                <select id="adminGroupSelector" onchange="updateVolSelector(); renderAdminQuery();" style="width: 100%; padding: 10px; border-radius: 8px; border: 1px solid #ccc; font-size: 16px; margin-bottom:15px; font-weight:bold; color:var(--primary-color);">
                    <option value="ALL">-- 所有組別 --</option>
                </select>

                <label style="font-weight:bold; display:block; margin-bottom:8px;">👤 選擇志工：</label>
                <select id="adminVolSelector" onchange="renderAdminQuery()" style="width: 100%; padding: 10px; border-radius: 8px; border: 1px solid #ccc; font-size: 16px; margin-bottom:15px; font-weight:bold; color:var(--primary-color);">
                    <option value="ALL">-- 所有名單 --</option>
                </select>

                <div style="display: flex; gap: 10px;">
                    <button id="adminTabMonthly" onclick="switchAdminQueryTab('monthly')" style="flex:1; padding:10px; border-radius:8px; border:none; background:var(--primary-color); color:white; font-weight:bold; cursor:pointer;">📅 單月</button>
                    <button id="adminTabYearly" onclick="switchAdminQueryTab('yearly')" style="flex:1; padding:10px; border-radius:8px; border:1px solid #ccc; background:white; color:var(--text-color); font-weight:bold; cursor:pointer;">📈 年度</button>
                </div>
            </div>

            <div style="background: white; padding: 15px; border-radius: 12px; box-shadow: var(--shadow); margin-bottom: 15px; text-align: center;">
                <div id="adminMonthSelectWrapper">
                    <input type="month" id="adminMonthSelector" onchange="renderAdminQuery()" style="width: 100%; padding: 10px; border-radius: 8px; border: 1px solid #ccc; font-size: 16px; box-sizing:border-box;">
                </div>
                <div id="adminYearSelectWrapper" style="display:none;">
                    <select id="adminYearSelector" onchange="renderAdminQuery()" style="width: 100%; padding: 10px; border-radius: 8px; border: 1px solid #ccc; font-size: 16px; box-sizing:border-box;"></select>
                </div>
                
                <div style="margin-top: 15px; padding-top: 15px; border-top: 1px dashed #eee; display: flex; justify-content: space-between; align-items: center;">
                    <div style="text-align:left;">
                        <span style="font-size: 13px; color: var(--secondary-text);">查詢範圍總計</span>
                        <div id="adminQueryTotalHours" style="font-size: 24px; font-weight: bold; color: var(--primary-color);">0.0 <span style="font-size:14px;">hr</span></div>
                    </div>
                    
                    <div style="display:flex; flex-direction:column; gap:8px;">
                        <button onclick="exportAdminQueryCSV()" style="background:#166534; color:white; border:none; padding:8px 15px; border-radius:8px; font-weight:bold; cursor:pointer; box-shadow: 0 4px 6px rgba(0,0,0,0.1);">📥 匯出明細報表</button>
                        <button id="exportSummaryBtn" onclick="exportYearlySummaryCSV()" style="display:none; background:#d97706; color:white; border:none; padding:8px 15px; border-radius:8px; font-weight:bold; cursor:pointer; box-shadow: 0 4px 6px rgba(0,0,0,0.1);">📊 匯出年度總表</button>
                    </div>
                </div>
            </div>

            <div id="adminQueryListContainer"></div>
        </div>
<div id="sectionManualEntry" class="section">
            <div style="display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px;">
                <button onclick="switchSection(document.getElementById('sectionAdmin'))" style="background:none; border:none; font-size:16px; color:var(--primary-color); font-weight:bold; cursor:pointer;">⬅️ 返回審核</button>
                <h2 style="margin:0; font-size: 18px;">✍️ 志工差勤補登</h2>
            </div>

            <div style="background: white; padding: 15px; border-radius: 12px; box-shadow: var(--shadow); margin-bottom: 15px;">
                <label style="font-weight:bold; display:block; margin-bottom:8px;">👤 選擇志工：</label>
                <input type="text" id="manualSearchInput" oninput="filterManualVolunteers()" placeholder="可輸入姓名或組別快速過濾..." style="width: 100%; padding: 10px; border-radius: 8px; border: 1px solid #ccc; font-size: 16px; margin-bottom:10px; box-sizing:border-box;">
                <select id="manualVolSelector" style="width: 100%; padding: 10px; border-radius: 8px; border: 1px solid #ccc; font-size: 16px; margin-bottom:15px; font-weight:bold; color:var(--primary-color);">
                    <option value="">-- 資料載入中 --</option>
                </select>

                <label style="font-weight:bold; display:block; margin-bottom:8px;">📅 補登日期：</label>
                <input type="date" id="manualDate" style="width: 100%; padding: 10px; border-radius: 8px; border: 1px solid #ccc; font-size: 16px; margin-bottom:15px; box-sizing:border-box;">

                <label style="font-weight:bold; display:block; margin-bottom:8px;">🕒 補登時間 (24小時制)：</label>
                <div style="display:flex; align-items:center; gap:5px; margin-bottom:15px;">
                    <select id="manualHour" style="flex:1; padding: 10px; border-radius: 8px; border: 1px solid #ccc; font-size: 16px; font-weight:bold;"></select>
                    <span style="font-weight:bold;">:</span>
                    <select id="manualMin" style="flex:1; padding: 10px; border-radius: 8px; border: 1px solid #ccc; font-size: 16px; font-weight:bold;"></select>
                </div>

                <label style="font-weight:bold; display:block; margin-bottom:8px;">📋 服務內容：</label>
                <label style="font-weight:bold; display:block; margin-bottom:8px;">📋 服務內容：</label>
                <select id="manualService" style="width: 100%; padding: 10px; border-radius: 8px; border: 1px solid #ccc; font-size: 16px; margin-bottom:15px;">
                    </select>

                <label style="font-weight:bold; display:block; margin-bottom:8px;">⏱️ 打卡狀態：</label>
                <div style="display: flex; gap: 20px; margin-bottom: 15px;">
                    <label><input type="radio" name="manualCheckType" value="簽到" checked onchange="toggleManualInputs()"> 簽到</label>
                    <label><input type="radio" name="manualCheckType" value="簽退" onchange="toggleManualInputs()"> 簽退</label>
                </div>

                <div style="display:flex; gap:10px; margin-bottom:15px;">
                    <div style="flex:1;">
                        <label style="font-weight:bold; display:block; margin-bottom:8px;">⭐ 加權：</label>
                        <input type="number" id="manualMultiplier" value="1" step="0.5" min="1" style="width: 100%; padding: 10px; border-radius: 8px; border: 1px solid #ccc; font-size: 16px; box-sizing:border-box;">
                    </div>
                    <div style="flex:2;">
                        <label style="font-weight:bold; display:block; margin-bottom:8px;">📝 備註 (選填)：</label>
                        <input type="text" id="manualRemark" placeholder="例：忘帶手機" style="width: 100%; padding: 10px; border-radius: 8px; border: 1px solid #ccc; font-size: 16px; box-sizing:border-box;">
                    </div>
                </div>

                <button onclick="submitManualEntry()" style="width: 100%; background: #00B900; color: white; border: none; padding: 12px; border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer;">✅ 確認補登</button>
            </div>
        </div>
    </div>

    <div class="result-overlay" id="resultOverlay">
        <div class="result-card">
            <div id="resultIcon"></div>
            <div id="resultStatus" style="font-size: 20px; font-weight: bold; margin-bottom: 10px;"></div>
            <div id="resultDistance" style="white-space: pre-line; margin-bottom: 20px; font-size: 14px;"></div>
            <button class="bind-btn" onclick="document.getElementById('resultOverlay').classList.remove('show');">關閉</button>
        </div>
    </div>

    <script>
        let isCulturalHoursEnabled = false; // 📍 記錄文化時數是否開啟
        const LIFF_ID = "2008914129-7KGP9Yxy"; 
        const GAS_URL = "https://script.google.com/macros/s/AKfycbwbnCirrFwG8mt7CBFbOP-_HMlzgBiA9d08iZYMHHjyAnRo2hrPII77qPWFX7s_3mAO/exec"; 

        let currentUserId = "";
        let currentLineName = ""; // 📍 新增：用來儲存使用者的 LINE 顯示名稱
        let dbUserName = ""; 
        let globalGroup = ""; 
        let globalTitle = ""; 

        const froggySuccessImg = `<img src="DK1.png" alt="成功" style="height:100px; margin-bottom:15px;">`;
        const froggyErrorImg = `<img src="DK2.png" alt="失敗" style="height:100px; margin-bottom:15px;">`;

        async function initializeApp() {
            try {
                await liff.init({ liffId: LIFF_ID });
                
                // 恢復原狀：只要沒登入，就乖乖執行登入程序
                if (!liff.isLoggedIn()) { 
                    liff.login(); 
                    return; 
                }
                
                const profile = await liff.getProfile();
                currentUserId = profile.userId;
                currentLineName = profile.displayName; // 📍 核心新增：抓取使用者的 LINE 顯示名稱
                document.getElementById('userAvatar').src = profile.pictureUrl;
                
                checkBindingStatus();
                
            } catch (err) { 
                // 保留詳細的錯誤訊息，方便未來除錯
                alert("系統初始化失敗，請確認網路連線或重啟 LINE。\n錯誤細節：" + err.message); 
            }
        }

        // 📍 輔助函數：處理職稱顯示邏輯
        function formatRoleDisplay(group, title) {
            if (!title && !group) return "準備執勤中";
            
            let displayTitle = title;
            // 貼心設計：拿掉「一般」兩字
            if (title === "一般志工") {
                displayTitle = "志工";
            }
            
            // 組織架構設計：大隊長的專屬顯示方式
            if (title === "大隊長") {
                return `大隊長 (所屬：${group})`;
            } else {
                return `${group} - ${displayTitle}`;
            }
        }

        // --- 志工打卡 UI ---

        // 📍 更新：打卡按鈕事件 (在主畫面顯示精美收據)
        document.getElementById('checkInBtn').addEventListener('click', () => {
            const btn = document.getElementById('checkInBtn');

                    const serviceType = document.getElementById('serviceSelect').value;
                    
                    statusMsg.innerHTML = "定位成功，資料傳送中...";

                        method: "POST", headers: { "Content-Type": "text/plain;charset=utf-8" }, 
                        body: JSON.stringify({
                            action: "checkIn", userId: currentUserId, lat: pos.coords.latitude, lng: pos.coords.longitude,
                            serviceType: serviceType,
                            checkType: checkType
                        })
                    }).then(res => res.json()).then(result => {
                        if (result.status === "success") {
                            const timeStr = new Date().toLocaleTimeString('zh-TW', { hour12: false });

                            // 給彈出視窗的訊息

                            // 📍 給主畫面下方的「精美明細卡片」
                            const mainHtml = `
                                <div style="color: #00B900; font-weight: bold; font-size: 16px; margin-bottom: 10px;">✅ 打卡成功明細</div>
                                <div style="background: #f0fdf4; padding: 15px; border-radius: 8px; border: 1px solid #bbf7d0; font-size: 15px; line-height: 1.8; color: #166534; text-align: left;">
                                    <div><b>👤 姓名：</b>${dbUserName}</div>
                                    <div><b>📋 服務：</b>${serviceType}</div>
                                    <div><b>⏱️ 狀態：</b>${checkType}</div>
                                    ${result.distance !== undefined ? `<div><b>📏 距離：</b>${result.distance} 公尺</div>` : ""}
                                    <div style="margin-top: 5px; border-top: 1px dashed #86efac; padding-top: 5px;">
                                        <b>⏰ 時間：</b><span style="font-weight: bold; font-size: 16px;">${timeStr}</span>
                                    </div>
                                </div>
                            `;
                            
                            showPopup(true, "打卡成功！", detailMsg);

                        } else {
                            showPopup(false, "打卡失敗", result.message);
                            statusMsg.innerHTML = `<span style="color:#ff4d4f; font-weight:bold;">❌ 打卡失敗：</span><br>${result.message}`;

                        btn.disabled = false; btnText.innerText = "點我打卡";
                    });
                },
                (err) => { 
                    showPopup(false, "定位失敗", "請確認手機已開啟位置權限。"); 
                    statusMsg.innerHTML = `<span style="color:#ff4d4f; font-weight:bold;">❌ 定位失敗：</span>請確認手機已開啟位置權限。`;
                    btn.disabled = false; btnText.innerText = "點我打卡"; 
                },

            );

        // 📍 3. 替換 setupAdminUI 函數 (加入館員專屬的文字轉換邏輯)
        function setupAdminUI(group, title) {

            document.getElementById('systemSubtitle').innerText = "館員管理中心";
            document.getElementById('staffName').innerText = "您好，" + dbUserName;

        function fetchPendingRecords() {
            const container = document.getElementById('adminRecordsContainer');
            container.innerHTML = '<p style="text-align:center; color:gray;">撈取資料中...</p>';
            
            fetch(GAS_URL, {
                method: "POST", headers: { "Content-Type": "text/plain;charset=utf-8" },
                body: JSON.stringify({ action: "getPendingRecords" })
            }).then(res => res.json()).then(result => {
                if(result.status === "success") {
                    container.innerHTML = "";
                    if (result.data.length === 0) {
                        container.innerHTML = '<p style="text-align:center; color:#00B900; font-weight:bold;">🎉 目前沒有待審核的紀錄！</p>';
                        return;
                    }
                    
                    // 📍 輔助函數：用來自動生成 00~23 或 00~59 的下拉選單選項
                    const getOptions = (max, selected) => {
                        let opts = '';
                        for(let i=0; i<=max; i++) {
                            let val = i.toString().padStart(2, '0');
                            opts += `<option value="${val}" ${val === selected ? 'selected' : ''}>${val}</option>`;
                        }
                        return opts;
                    };

                    result.data.forEach(record => {
                        const card = document.createElement('div');
                        const isSignIn = record.checkType === '簽到';
                        const borderColorClass = isSignIn ? 'sign-in' : 'sign-out';
                        card.className = `record-card ${borderColorClass}`;
                        
                        const timeLabel = isSignIn ? '簽到時間' : '簽退時間';
                        const [datePart, timePart] = record.timestamp.split('T');
                        const displayDate = datePart.replace(/-/g, '/'); 
                        const [origHour, origMin] = timePart.split(':'); // 切出原始的時與分
                        
                        const styles = isSignIn 
                            ? { bg: '#f0fdf4', border: '#bbf7d0', text: '#166534', input: '#00B900' }
                            : { bg: '#fff1f0', border: '#ffa39e', text: '#a8071a', input: '#ff4d4f' };
                        
                        const multiplierHtml = isSignIn 
                            ? `<div style="flex:1;">
                                   <label style="font-size:13px; font-weight:bold; display:block; margin-bottom:5px;">加權：</label>
                                   <input type="number" id="mul_${record.uuid}" value="1" step="0.5" min="1" style="margin:0; padding:8px;">
                               </div>`
                            : `<input type="hidden" id="mul_${record.uuid}" value="1">`; 
                        
                        card.innerHTML = `
                            <div class="record-title" style="display:flex; justify-content:space-between; align-items:center; cursor:pointer;" onclick="toggleCardCheckbox('${record.uuid}', event)">
                                <div style="display:flex; align-items:center;">
                                    <input type="checkbox" class="batch-checkbox" id="cb_${record.uuid}" value="${record.uuid}" style="display:none; transform: scale(1.5); margin-right: 15px; cursor:pointer;" onclick="event.stopPropagation(); updateBatchCount();">
                                    <span>👤 ${record.volunteerName}</span>
                                </div>
                                <span class="record-tag">${record.checkType}</span>
                            </div>
                            
                            <div style="font-size:14px; margin-bottom:12px; color:#555;">📍 服務內容：${record.serviceType}</div>
                            
                            <div style="font-size:14px; margin-bottom:15px; background: ${styles.bg}; padding: 12px; border-radius: 8px; border: 1px solid ${styles.border}; display: flex; align-items: center; flex-wrap: wrap; gap: 5px;">
                                <span style="font-weight:bold; color:${styles.text};">🕒 ${timeLabel}：</span> 
                                <span style="color:${styles.text}; margin-right: 5px;">${displayDate}</span>
                                
                                <div style="display:flex; align-items:center; gap:3px;">
                                    <select id="hour_${record.uuid}" data-date="${datePart}" style="border: 1px solid ${styles.input}; color: ${styles.input}; font-weight: bold; font-size: 16px; background: white; padding: 4px; border-radius: 6px; cursor: pointer; outline: none;">
                                        ${getOptions(23, origHour)}
                                    </select>
                                    <span style="font-weight:bold; color:${styles.input};">:</span>
                                    <select id="min_${record.uuid}" style="border: 1px solid ${styles.input}; color: ${styles.input}; font-weight: bold; font-size: 16px; background: white; padding: 4px; border-radius: 6px; cursor: pointer; outline: none;">
                                        ${getOptions(59, origMin)}
                                    </select>
                                </div>
                            </div>
                            
                            <div style="display:flex; gap:10px; align-items: flex-end; margin-bottom: 15px;">
                                ${multiplierHtml}
                                <div style="flex:2;">
                                    <label style="font-size:13px; font-weight:bold; display:block; margin-bottom:5px;">館員備註：</label>
                                    <input type="text" id="rem_${record.uuid}" placeholder="選填" style="margin:0; padding:8px;">
                                </div>
                            </div>
                            
                            <button class="approve-btn" id="btnApprove_${record.uuid}" onclick="approveRecord('${record.uuid}')">✅ 確認核准</button>
                        `;
                        container.appendChild(card);
                    });
                }
            });
        }

        function approveRecord(uuid) {
            // 📍 核心修改：從下拉選單抓出數值並組裝回標準時間格式
            const hourSelect = document.getElementById(`hour_${uuid}`);
            const minSelect = document.getElementById(`min_${uuid}`);
            
            const datePart = hourSelect.getAttribute('data-date'); 
            const hourPart = hourSelect.value;
            const minPart = minSelect.value;
            const newTime = `${datePart}T${hourPart}:${minPart}`; // 組合回 GAS 要的 2026-03-21T13:40 格式
            
            const multiplier = document.getElementById(`mul_${uuid}`).value;
            const remark = document.getElementById(`rem_${uuid}`).value;
            
            const btn = event.target;
            btn.disabled = true; btn.innerText = "處理中...";

            fetch(GAS_URL, {
                method: "POST", headers: { "Content-Type": "text/plain;charset=utf-8" },
                body: JSON.stringify({ 
                    action: "approveRecord", uuid: uuid, newTime: newTime, multiplier: multiplier, remark: remark, staffName: dbUserName
                })
            }).then(res => res.json()).then(result => {
                if(result.status === "success") {
                    fetchPendingRecords(); // 重新撈取清單
                } else {
                    // 如果後端 GAS 發現時間順序錯誤，就會在這裡跳出警告！
                    alert(result.message);
                    btn.disabled = false; btn.innerText = "✅ 確認核准";
                }
            });
        }

        // --- 共用輔助 ---
        function switchSection(targetSection) {
            document.querySelectorAll('.section').forEach(sec => sec.classList.remove('active'));
            targetSection.classList.add('active');
        }
        // --- 修正 showPopup 函數 ---
        // 確保彈出視窗不會意外覆蓋到我們剛精心設計的主畫面狀態
        function showPopup(isSuccess, title, msg) {
            document.getElementById('resultIcon').innerHTML = isSuccess ? froggySuccessImg : froggyErrorImg;
            document.getElementById('resultStatus').innerText = title;
            document.getElementById('resultDistance').innerText = msg;
            document.getElementById('resultOverlay').classList.add('show');
        }
        initializeApp();
        // ==========================================
        // 📍 志工服務紀錄查詢邏輯
        // ==========================================
        let allVolunteerRecords = [];

        function openRecordsUI() {
            switchSection(document.getElementById('sectionRecords'));
            
            // 預設設定年月選擇器為當前時間
            const now = new Date();
            const currentMonth = now.toISOString().slice(0, 7); // 格式: YYYY-MM
            const currentYear = currentMonth.slice(0, 4);
            
            document.getElementById('monthSelector').value = currentMonth;
            
            // 填入年份下拉選單 (近3年)
            const yearSelect = document.getElementById('yearSelector');
            yearSelect.innerHTML = "";
            for (let y = parseInt(currentYear); y >= parseInt(currentYear) - 2; y--) {
                yearSelect.innerHTML += `<option value="${y}">${y} 年</option>`;
            }

            // 呼叫 GAS 撈取資料
            document.getElementById('monthlyListContainer').innerHTML = '<p style="text-align:center; color:gray;">資料載入中 ⏳...</p>';
            
            fetch(GAS_URL, {
                method: "POST", headers: { "Content-Type": "text/plain;charset=utf-8" },
                body: JSON.stringify({ action: "getVolunteerRecords", userId: currentUserId })
            }).then(res => res.json()).then(result => {
                if(result.status === "success") {
                    allVolunteerRecords = result.data;
                    renderMonthlyRecords(); // 預設渲染單月
                } else {
                    alert("載入失敗：" + result.message);
                }
            });
        }

        function switchRecordTab(tab) {
            const btnMonthly = document.getElementById('tabMonthly');
            const btnYearly = document.getElementById('tabYearly');
            const viewMonthly = document.getElementById('viewMonthly');
            const viewYearly = document.getElementById('viewYearly');

            if (tab === 'monthly') {
                btnMonthly.style.background = 'var(--primary-color)'; btnMonthly.style.color = 'white'; btnMonthly.style.border = 'none';
                btnYearly.style.background = 'white'; btnYearly.style.color = 'var(--text-color)'; btnYearly.style.border = '1px solid #ccc';
                viewMonthly.style.display = 'block'; viewYearly.style.display = 'none';
                renderMonthlyRecords();
            } else {
                btnYearly.style.background = 'var(--text-color)'; btnYearly.style.color = 'white'; btnYearly.style.border = 'none';
                btnMonthly.style.background = 'white'; btnMonthly.style.color = 'var(--text-color)'; btnMonthly.style.border = '1px solid #ccc';
                viewYearly.style.display = 'block'; viewMonthly.style.display = 'none';
                renderYearlyRecords();
            }
        }

        function renderMonthlyRecords() {
            const selectedMonth = document.getElementById('monthSelector').value;
            const container = document.getElementById('monthlyListContainer');
            container.innerHTML = "";

            let totalHours = 0;
            let typeHours = {}; // 📍 新增：用來記錄各項服務內容的總和

            const filteredRecords = allVolunteerRecords.filter(r => r.yearMonth === selectedMonth);
            if (filteredRecords.length === 0) {
                container.innerHTML = `<div style="text-align:center; color:gray; padding: 20px; background:white; border-radius:12px;">這個月還沒有已審核的執勤紀錄喔！</div>`;
            } else {
                filteredRecords.forEach(r => {
                    totalHours += r.finalHours;
                    // 📍 累加該服務類別的時數
                    typeHours[r.serviceType] = (typeHours[r.serviceType] || 0) + r.finalHours;
                    
                    const multiplierText = r.multiplier > 1 ? `<span style="color:#d97706; font-size:12px; font-weight:bold; background:#fef3c7; padding:2px 6px; border-radius:4px; margin-left:5px;">⭐ 加權 x${r.multiplier}</span>` : "";
                    const remarkHtml = r.remark ? `<div style="font-size:13px; color:#888; margin-top:5px; border-top:1px dashed #eee; padding-top:5px;">📝 備註：${r.remark}</div>` : "";

                    const hoursDisplay = r.multiplier > 1 
                        ? `<span style="font-size:13px; color:#888; font-weight:normal; margin-right:5px;">(原始 ${r.rawHours.toFixed(1)})</span>${r.finalHours.toFixed(1)} <span style="font-size:12px;">hr</span>` 
                        : `${r.finalHours.toFixed(1)} <span style="font-size:12px;">hr</span>`;
                    container.innerHTML += `
                        <div style="background: white; padding: 15px; border-radius: 12px; box-shadow: var(--shadow); margin-bottom: 12px; border-left: 4px solid var(--primary-color);">
                            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:8px;">
                                <div style="font-weight:bold; font-size:16px;">📅 ${r.date}</div>
                                <div style="font-weight:bold; color:var(--primary-color); font-size:16px;">${hoursDisplay}</div>
                            </div>
                            <div style="font-size:14px; color:#555; margin-bottom:5px;">⏱️ ${r.startTime} ~ ${r.endTime}</div>
                            <div style="font-size:14px; color:#555;">📍 服務：${r.serviceType} ${multiplierText}</div>
                            ${remarkHtml}
                        </div>
                    `;
                });
            }
            
            // 📍 組合分類統計字串並顯示在總時數下方
            let breakdownStr = Object.keys(typeHours).map(k => `${k}: ${typeHours[k].toFixed(1)}`).join(' | ');
            if (breakdownStr) breakdownStr = `<br><span style="font-size:14px; color:#666; font-weight:normal;">(明細：${breakdownStr})</span>`;
            
            document.getElementById('monthlyTotalHours').innerHTML = `${totalHours.toFixed(1)} <span style="font-size:16px;">小時</span>${breakdownStr}`;
        }

        function renderYearlyRecords() {
            const selectedYear = document.getElementById('yearSelector').value;
            const container = document.getElementById('yearlyListContainer');
            container.innerHTML = "";

            let yearTotal = 0;
            const monthlySums = {}; // 儲存 1~12 月的加總

            allVolunteerRecords.forEach(r => {
                if (r.year === selectedYear) {
                    yearTotal += r.finalHours;
                    if (!monthlySums[r.yearMonth]) monthlySums[r.yearMonth] = 0;
                    monthlySums[r.yearMonth] += r.finalHours;
                }
            });

            if (Object.keys(monthlySums).length === 0) {
                container.innerHTML = `<div style="text-align:center; color:gray; padding: 20px; background:white; border-radius:12px;">該年度尚未有執勤紀錄。</div>`;
            } else {
                // 將月份排序 (例如 2026-03, 2026-02...)
                const sortedMonths = Object.keys(monthlySums).sort().reverse();
                
                sortedMonths.forEach(ym => {
                    const [, month] = ym.split('-');
                    container.innerHTML += `
                        <div style="background: white; padding: 15px; border-radius: 12px; box-shadow: var(--shadow); margin-bottom: 10px; display:flex; justify-content:space-between; align-items:center; border-left: 4px solid #d97706;">
                            <div style="font-weight:bold; font-size:16px;">📅 ${month} 月份結算</div>
                            <div style="font-weight:bold; color:#d97706; font-size:18px;">${monthlySums[ym].toFixed(1)} <span style="font-size:13px;">hr</span></div>
                        </div>
                    `;
                });
            }
            document.getElementById('yearlyTotalHours').innerText = yearTotal.toFixed(1);
        }

// ==========================================
        // 📍 館員全體差勤查詢與報表匯出邏輯
        // ==========================================
        let allAdminQueryRecords = [];
        let globalRoster = []; // 📍 新增：儲存志工名冊
        let currentAdminQueryTab = 'monthly';

        // 傳入 from 參數，判斷是從哪裡進來的
        function openAdminQueryUI(from = 'admin') {
            switchSection(document.getElementById('sectionAdminQuery'));
            
            const backBtn = document.getElementById('adminQueryBackBtn');
            if (from === 'volunteer') {
                backBtn.onclick = () => switchSection(document.getElementById('sectionCheckIn'));
            } else {
                backBtn.onclick = () => switchSection(document.getElementById('sectionAdmin'));
            }

            const now = new Date();
            const currentMonth = now.toISOString().slice(0, 7); 
            const currentYear = currentMonth.slice(0, 4);
            
            document.getElementById('adminMonthSelector').value = currentMonth;
            const yearSelect = document.getElementById('adminYearSelector');
            yearSelect.innerHTML = "";
            for (let y = parseInt(currentYear); y >= parseInt(currentYear) - 2; y--) {
                yearSelect.innerHTML += `<option value="${y}">${y} 年</option>`;
            }

            document.getElementById('adminQueryListContainer').innerHTML = '<p style="text-align:center; color:gray;">正在從雲端載入資料 ⏳...</p>';
            
            fetch(GAS_URL, {
                method: "POST", headers: { "Content-Type": "text/plain;charset=utf-8" },
                body: JSON.stringify({ action: "getAllVolunteerRecords", userId: currentUserId })
            }).then(res => res.json()).then(result => {
                if(result.status === "success") {
                    allAdminQueryRecords = result.data;
                    globalRoster = result.roster; 
                    
                    // 📍 第一階：動態產生組別下拉選單
                    const groupSelect = document.getElementById('adminGroupSelector');
                    const uniqueGroups = [...new Set(globalRoster.map(v => v.group))];
                    
                    // 如果權限只有單一組別(小組長)，就不顯示"所有組別"，直接鎖定
                    groupSelect.innerHTML = uniqueGroups.length > 1 ? '<option value="ALL">-- 所有組別 --</option>' : '';
                    uniqueGroups.forEach(g => {
                        groupSelect.innerHTML += `<option value="${g}">${g}</option>`;
                    });

                    // 📍 觸發連動，產生第二階志工名單
                    updateVolSelector();
                    renderAdminQuery();
                } else alert("載入失敗：" + result.message);
            }).catch(err => alert("載入失敗，請確認已部署新版本！\n" + err.message));
        }

        // 📍 補回遺漏的：館員查詢介面頁籤切換函數
        function switchAdminQueryTab(tab) {
            currentAdminQueryTab = tab;
            const btnMonthly = document.getElementById('adminTabMonthly');
            const btnYearly = document.getElementById('adminTabYearly');
            
            if (tab === 'monthly') {
                btnMonthly.style.background = 'var(--primary-color)'; btnMonthly.style.color = 'white'; btnMonthly.style.border = 'none';
                btnYearly.style.background = 'white'; btnYearly.style.color = 'var(--text-color)'; btnYearly.style.border = '1px solid #ccc';
                document.getElementById('adminMonthSelectWrapper').style.display = 'block';
                document.getElementById('adminYearSelectWrapper').style.display = 'none';
                document.getElementById('exportSummaryBtn').style.display = 'none'; // 隱藏年度總表按鈕
            } else {
                btnYearly.style.background = 'var(--text-color)'; btnYearly.style.color = 'white'; btnYearly.style.border = 'none';
                btnMonthly.style.background = 'white'; btnMonthly.style.color = 'var(--text-color)'; btnMonthly.style.border = '1px solid #ccc';
                document.getElementById('adminYearSelectWrapper').style.display = 'block';
                document.getElementById('adminMonthSelectWrapper').style.display = 'none';
                document.getElementById('exportSummaryBtn').style.display = 'block'; // 顯示年度總表按鈕
            }
            renderAdminQuery();
        }

        // 📍 核心更新：加入關鍵字搜尋的志工選單連動 (加入 LINE 名稱顯示)
        function updateVolSelector() {
            const selectedGroup = document.getElementById('adminGroupSelector').value;
            const keyword = document.getElementById('adminSearchInput').value.trim().toLowerCase();
            const volSelect = document.getElementById('adminVolSelector');
            
            let filteredRoster = globalRoster;
            
            if (selectedGroup !== "ALL") {
                filteredRoster = filteredRoster.filter(v => v.group === selectedGroup);
            }
            
            if (keyword !== "") {
                filteredRoster = filteredRoster.filter(v => {
                    const searchStr = `${v.name} ${v.group} ${v.title} ${v.phone} ${v.email} ${v.lineName}`.toLowerCase();
                    return searchStr.includes(keyword);
                });
            }

            const nameCounts = {};
            globalRoster.forEach(vol => { nameCounts[vol.name] = (nameCounts[vol.name] || 0) + 1; });

            volSelect.innerHTML = '<option value="ALL">-- 所有名單 --</option>';
            filteredRoster.forEach(vol => {
                const val = vol.lineId || `unbound_${Math.random()}`;
                let displayName = vol.name;
                
                if (vol.lineId) {
                    // 📍 核心修改：如果有 LINE 名稱，就顯示在名字旁邊
                    if (vol.lineName) displayName += ` [LINE: ${vol.lineName}]`;
                    if (nameCounts[vol.name] > 1 && vol.phoneTail !== "無") displayName += ` (尾數${vol.phoneTail})`;
                } else displayName += ` (尚未綁定)`;
                
                volSelect.innerHTML += `<option value="${val}">${displayName}</option>`;
            });
        }

        function renderAdminQuery() {
            const container = document.getElementById('adminQueryListContainer');
            container.innerHTML = "";
            let totalHours = 0;
            let typeHoursGlobal = {}; // 📍 全域分類，用於最底部的加總

            const selectedGroup = document.getElementById('adminGroupSelector').value;
            const selectedVolId = document.getElementById('adminVolSelector').value;
            const keyword = document.getElementById('adminSearchInput').value.trim().toLowerCase();
            const selectedMonth = document.getElementById('adminMonthSelector').value;
            const selectedYear = document.getElementById('adminYearSelector').value;

            let filtered = allAdminQueryRecords;
            let validRoster = globalRoster;
            
            if (selectedGroup !== "ALL") validRoster = validRoster.filter(v => v.group === selectedGroup);
            if (keyword !== "") {
                validRoster = validRoster.filter(v => {
                    const searchStr = `${v.name} ${v.group} ${v.title} ${v.phone} ${v.email} ${v.lineName}`.toLowerCase();
                    return searchStr.includes(keyword);
                });
            }
            const validUserIds = validRoster.map(v => v.lineId);

            if (selectedVolId === "ALL" && (selectedGroup !== "ALL" || keyword !== "")) {
                filtered = filtered.filter(r => validUserIds.includes(r.userId));
            }
            if (selectedVolId !== "ALL") {
                filtered = filtered.filter(r => r.userId === selectedVolId);
            }

            if (currentAdminQueryTab === 'monthly') {
                filtered = filtered.filter(r => r.yearMonth === selectedMonth);
                if (filtered.length === 0) container.innerHTML = `<div style="text-align:center; color:gray; padding: 20px;">無符合條件的紀錄。</div>`;
                else {
                    filtered.forEach(r => {
                        totalHours += r.finalHours;
                        typeHoursGlobal[r.serviceType] = (typeHoursGlobal[r.serviceType] || 0) + r.finalHours; // 累加

                        const multiplierText = r.multiplier > 1 ? `<span style="color:#d97706; font-size:12px; font-weight:bold; background:#fef3c7; padding:2px 6px; border-radius:4px;">⭐ x${r.multiplier}</span>` : "";
                        const remarkHtml = r.remark ? `<div style="font-size:13px; color:#888; margin-top:5px; border-top:1px dashed #eee; padding-top:5px;">📝 備註：${r.remark}</div>` : "";
                        const hoursDisplay = r.multiplier > 1 ? `<span style="font-size:13px; color:#888; font-weight:normal; margin-bottom:3px; display:block;">(原始 ${r.rawHours.toFixed(1)})</span>${r.finalHours.toFixed(1)} <span style="font-size:12px;">hr</span>` : `${r.finalHours.toFixed(1)} <span style="font-size:12px;">hr</span>`;

                        const volInfo = globalRoster.find(v => v.lineId === r.userId);
                        const lineNameDisplay = (volInfo && volInfo.lineName) ? `📱 LINE: ${volInfo.lineName} &nbsp;&nbsp;|&nbsp;&nbsp; ` : "";

                        container.innerHTML += `
                            <div style="background: white; padding: 15px; border-radius: 12px; box-shadow: var(--shadow); margin-bottom: 12px; border-left: 4px solid var(--primary-color);">
                                <div style="display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:8px; border-bottom: 1px dashed #eee; padding-bottom: 8px;">
                                    <div>
                                        <div style="font-weight:bold; font-size:16px; margin-bottom:5px;">👤 ${r.volunteerName}</div>
                                        <div style="font-size:12px; color:#666;">${lineNameDisplay}📅 ${r.date}</div>
                                    </div>
                                    <div style="font-weight:bold; color:var(--primary-color); font-size:16px; text-align:right; line-height: 1.2;">
                                        ${hoursDisplay}
                                    </div>
                                </div>
                                <div style="font-size:13px; color:#555; margin-bottom:5px;">⏱️ ${r.startTime} ~ ${r.endTime} &nbsp; 📍 ${r.serviceType} ${multiplierText}</div>
                                <div style="font-size:12px; color:#00897b; font-weight:bold; background:#e0f2f1; display:inline-block; padding:3px 8px; border-radius:10px;">✅ 確認館員：${r.staffName}</div>
                                ${remarkHtml}
                            </div>
                        `;
                    });
                }
            } else {
                // 年度視圖邏輯
                filtered = filtered.filter(r => r.year === selectedYear);
                const monthlySums = {}; 
                const monthlyTypes = {}; // 📍 用於紀錄每個月的分類時數

                filtered.forEach(r => {
                    totalHours += r.finalHours;
                    typeHoursGlobal[r.serviceType] = (typeHoursGlobal[r.serviceType] || 0) + r.finalHours;

                    if (!monthlySums[r.yearMonth]) {
                        monthlySums[r.yearMonth] = 0;
                        monthlyTypes[r.yearMonth] = {};
                    }
                    monthlySums[r.yearMonth] += r.finalHours;
                    monthlyTypes[r.yearMonth][r.serviceType] = (monthlyTypes[r.yearMonth][r.serviceType] || 0) + r.finalHours;
                });

                if (Object.keys(monthlySums).length === 0) container.innerHTML = `<div style="text-align:center; color:gray; padding: 20px;">該年度無紀錄。</div>`;
                else {
                    const sortedMonths = Object.keys(monthlySums).sort().reverse();
                    const selectedNameText = document.getElementById('adminVolSelector').options[document.getElementById('adminVolSelector').selectedIndex].text;
                    const selectedGroupText = document.getElementById('adminGroupSelector').options[document.getElementById('adminGroupSelector').selectedIndex].text;

                    sortedMonths.forEach(ym => {
                        const [, month] = ym.split('-');
                        let titleText = "";
                        
                        if (selectedVolId !== "ALL") titleText = `👤 ${selectedNameText} ${month} 月份總計`;
                        else {
                            if (selectedGroup !== "ALL") titleText = `👥 ${selectedGroupText} ${month} 月份總計`;
                            else titleText = `全館 ${month} 月份總計`;
                            if (keyword !== "") titleText += ` (含關鍵字搜尋)`;
                        }

                        // 📍 組合該月的分類明細
                        let monthBreakdown = Object.keys(monthlyTypes[ym]).map(k => `${k}:${monthlyTypes[ym][k].toFixed(1)}`).join(', ');

                        container.innerHTML += `
                            <div style="background: white; padding: 15px; border-radius: 12px; box-shadow: var(--shadow); margin-bottom: 10px; border-left: 4px solid #d97706;">
                                <div style="display:flex; justify-content:space-between; align-items:center;">
                                    <div style="font-weight:bold; font-size:15px;">📅 ${titleText}</div>
                                    <div style="font-weight:bold; color:#d97706; font-size:18px;">${monthlySums[ym].toFixed(1)} <span style="font-size:13px;">hr</span></div>
                                </div>
                                <div style="font-size:13px; color:#777; margin-top:5px; padding-top:5px; border-top:1px dashed #eee;">
                                    📊 明細：${monthBreakdown}
                                </div>
                            </div>
                        `;
                    });
                }
            }
            
            // 📍 更新底部的總時數與總分類明細
            let globalBreakdownStr = Object.keys(typeHoursGlobal).map(k => `${k} ${typeHoursGlobal[k].toFixed(1)}`).join(' | ');
            if (globalBreakdownStr) globalBreakdownStr = `<br><span style="font-size:14px; color:#666; font-weight:normal;">(${globalBreakdownStr})</span>`;
            document.getElementById('adminQueryTotalHours').innerHTML = `${totalHours.toFixed(1)} <span style="font-size:14px;">hr</span>${globalBreakdownStr}`;
        }

        // 📍 更新：匯出明細報表 (套用關鍵字與組別過濾)
        function exportAdminQueryCSV() {
            if (allAdminQueryRecords.length === 0) { alert("目前沒有資料可以匯出！"); return; }
            
            const selectedGroup = document.getElementById('adminGroupSelector').value;
            const selectedVolId = document.getElementById('adminVolSelector').value;
            const keyword = document.getElementById('adminSearchInput').value.trim().toLowerCase();
            const selectedMonth = document.getElementById('adminMonthSelector').value;
            const selectedYear = document.getElementById('adminYearSelector').value;
            
            let filtered = allAdminQueryRecords;
            
            let validRoster = globalRoster;
            if (selectedGroup !== "ALL") validRoster = validRoster.filter(v => v.group === selectedGroup);
            if (keyword !== "") {
                validRoster = validRoster.filter(v => {
                    const searchStr = `${v.name} ${v.group} ${v.title} ${v.phone} ${v.email} ${v.lineName}`.toLowerCase();
                    return searchStr.includes(keyword);
                });
            }
            const validUserIds = validRoster.map(v => v.lineId);

            if (selectedVolId === "ALL" && (selectedGroup !== "ALL" || keyword !== "")) {
                filtered = filtered.filter(r => validUserIds.includes(r.userId));
            }
            if (selectedVolId !== "ALL") filtered = filtered.filter(r => r.userId === selectedVolId);
            
            if (currentAdminQueryTab === 'monthly') filtered = filtered.filter(r => r.yearMonth === selectedMonth);
            else filtered = filtered.filter(r => r.year === selectedYear);

            if (filtered.length === 0) { alert("這個範圍內沒有資料可匯出！"); return; }

            let csvContent = "\uFEFF"; 
            csvContent += "志工姓名,日期,簽到,簽退,服務內容,原始時數,加權,結算時數,確認館員,備註\n";
            
            filtered.forEach(r => {
                const safeRemark = r.remark ? r.remark.replace(/"/g, '""') : "";
                const row = [ r.volunteerName, r.date, r.startTime, r.endTime, r.serviceType, r.rawHours.toFixed(1), r.multiplier, r.finalHours.toFixed(1), r.staffName, `"${safeRemark}"` ];
                csvContent += row.join(",") + "\n";
            });

            const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
            const url = URL.createObjectURL(blob);
            const link = document.createElement("a");
            
            let prefix = selectedVolId !== "ALL" ? document.getElementById('adminVolSelector').options[document.getElementById('adminVolSelector').selectedIndex].text.split(" ")[0] : (selectedGroup !== "ALL" ? selectedGroup : "全館");
            if (keyword !== "" && selectedVolId === "ALL") prefix += "_搜尋結果";
            
            const fileName = currentAdminQueryTab === 'monthly' ? `${prefix}_${selectedMonth}_差勤明細.csv` : `${prefix}_${selectedYear}_年度差勤明細.csv`;
            
            link.setAttribute("href", url);
            link.setAttribute("download", fileName);
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        }

       // 📍 更新：匯出年度總結算表 (套用關鍵字過濾)
        function exportYearlySummaryCSV() {
            if (globalRoster.length === 0) { alert("無法取得志工名冊資料！"); return; }
            
            const selectedGroup = document.getElementById('adminGroupSelector').value;
            const keyword = document.getElementById('adminSearchInput').value.trim().toLowerCase();
            const selectedYear = document.getElementById('adminYearSelector').value;
            
            // 📍 1. 動態抓取該年度出現過的所有「服務內容」種類
            const yearRecords = allAdminQueryRecords.filter(r => r.year === selectedYear);
            const serviceTypes = [...new Set(yearRecords.map(r => r.serviceType))];
            
            let csvContent = "\uFEFF"; 
            // 📍 2. 表頭動態加上分類欄位
            csvContent += `組別,志工姓名,1月,2月,3月,4月,5月,6月,7月,8月,9月,10月,11月,12月,年度總計,${serviceTypes.map(t => t + "總計").join(",")}\n`;

            const nameCounts = {};
            globalRoster.forEach(vol => { nameCounts[vol.name] = (nameCounts[vol.name] || 0) + 1; });

            let targetRoster = globalRoster;
            if (selectedGroup !== "ALL") targetRoster = targetRoster.filter(v => v.group === selectedGroup);
            if (keyword !== "") {
                targetRoster = targetRoster.filter(v => {
                    const searchStr = `${v.name} ${v.group} ${v.title} ${v.phone} ${v.email} ${v.lineName}`.toLowerCase();
                    return searchStr.includes(keyword);
                });
            }

            targetRoster.forEach(vol => {
                let monthlyHours = Array(12).fill(0);
                let yearlyTotal = 0;
                let typeTotals = {}; // 📍 紀錄個人各分類總和
                serviceTypes.forEach(t => typeTotals[t] = 0); // 初始化為 0

                if (vol.lineId) {
                    const volRecords = yearRecords.filter(r => r.userId === vol.lineId);
                    volRecords.forEach(r => {
                        const monthIndex = parseInt(r.yearMonth.split('-')[1], 10) - 1; 
                        monthlyHours[monthIndex] += r.finalHours;
                        yearlyTotal += r.finalHours;
                        typeTotals[r.serviceType] += r.finalHours; // 📍 累加分類時數
                    });
                }

                let displayName = vol.name;
                if (nameCounts[vol.name] > 1 && vol.phoneTail !== "無") displayName += `(尾數${vol.phoneTail})`;

                // 📍 3. 將分類總和加入 CSV 資料行
                const typeValues = serviceTypes.map(t => typeTotals[t].toFixed(1));
                const row = [vol.group, displayName, ...monthlyHours.map(h => h.toFixed(1)), yearlyTotal.toFixed(1), ...typeValues];
                csvContent += row.join(",") + "\n";
            });

            const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
            const url = URL.createObjectURL(blob);
            const link = document.createElement("a");
            
            let prefix = selectedGroup !== "ALL" ? selectedGroup : "全館";
            if (keyword !== "") prefix += "_搜尋結果";
            
            link.setAttribute("href", url);
            link.setAttribute("download", `${prefix}_${selectedYear}_年度時數總表.csv`);
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        }

        // ==========================================
        // 📍 館員補登專用邏輯
        // ==========================================
        let manualRoster = [];

        function openManualEntryUI() {
            switchSection(document.getElementById('sectionManualEntry'));

            // 預設日期為今天
            const today = new Date();
            const yyyy = today.getFullYear();
            const mm = String(today.getMonth() + 1).padStart(2, '0');
            const dd = String(today.getDate()).padStart(2, '0');
            document.getElementById('manualDate').value = `${yyyy}-${mm}-${dd}`;

            // 生成 24 小時制的時分選單
            const getOptions = (max) => {
                let opts = '';
                for(let i=0; i<=max; i++) {
                    let val = i.toString().padStart(2, '0');
                    opts += `<option value="${val}">${val}</option>`;
                }
                return opts;
            };
            document.getElementById('manualHour').innerHTML = getOptions(23);
            document.getElementById('manualMin').innerHTML = getOptions(59);
            
            // 📍 每次打開時，預設重置為「簽到」並恢復輸入框狀態
            document.querySelector('input[name="manualCheckType"][value="簽到"]').checked = true;
            toggleManualInputs();

            // 呼叫後端抓取館員專用的志工名單
            document.getElementById('manualVolSelector').innerHTML = '<option value="">名單載入中 ⏳...</option>';
            fetch(GAS_URL, {
                method: "POST", headers: { "Content-Type": "text/plain;charset=utf-8" },
                body: JSON.stringify({ action: "getRoster", userId: currentUserId })
            }).then(res => res.json()).then(result => {
                if(result.status === "success") {
                    manualRoster = result.roster;
                    filterManualVolunteers(); 
                } else alert("權限不足或載入失敗：" + result.message);
            }).catch(err => alert("載入失敗：" + err.message));
        }

        // 📍 新增：補登介面的防呆切換器 (選擇簽退時，鎖定服務內容與加權)
        function toggleManualInputs() {
            const checkType = document.querySelector('input[name="manualCheckType"]:checked').value;
            const serviceSelect = document.getElementById('manualService');
            const multiplierInput = document.getElementById('manualMultiplier');

            if (checkType === "簽退") {
                serviceSelect.disabled = true;
                serviceSelect.style.backgroundColor = "#f5f5f5";
                multiplierInput.disabled = true;
                multiplierInput.value = 1;
                multiplierInput.style.backgroundColor = "#f5f5f5";
            } else {
                serviceSelect.disabled = false;
                serviceSelect.style.backgroundColor = "white";
                multiplierInput.disabled = false;
                multiplierInput.style.backgroundColor = "white";
            }
        }

        // 📍 補登專用的志工搜尋過濾器 (加入 LINE 名稱顯示)
        function filterManualVolunteers() {
            const keyword = document.getElementById('manualSearchInput').value.trim().toLowerCase();
            const volSelect = document.getElementById('manualVolSelector');

            let filtered = manualRoster;
            if (keyword !== "") {
                filtered = filtered.filter(v => v.name.toLowerCase().includes(keyword) || v.group.toLowerCase().includes(keyword));
            }

            const nameCounts = {};
            manualRoster.forEach(vol => { nameCounts[vol.name] = (nameCounts[vol.name] || 0) + 1; });

            volSelect.innerHTML = '<option value="">-- 請選擇要補登的志工 --</option>';
            filtered.forEach(vol => {
                let displayName = vol.name;
                
                // 📍 核心修改：如果有 LINE 名稱，顯示在選單上
                if (vol.lineName) displayName += ` [LINE: ${vol.lineName}]`;
                if (nameCounts[vol.name] > 1 && vol.phoneTail !== "無") displayName += ` (尾數${vol.phoneTail})`;
                
                displayName += ` - ${vol.group}`; 
                
                volSelect.innerHTML += `<option value="${vol.lineId}" data-name="${vol.name}">${displayName}</option>`;
            });
        }

        // 📍 送出補登資料
        function submitManualEntry() {
            const volSelect = document.getElementById('manualVolSelector');
            const targetUserId = volSelect.value;
            if (!targetUserId) { alert("⚠️ 請先選擇要補登的志工！"); return; }
            
            const volunteerName = volSelect.options[volSelect.selectedIndex].getAttribute('data-name');
            const dateStr = document.getElementById('manualDate').value;
            const hour = document.getElementById('manualHour').value;
            const min = document.getElementById('manualMin').value;
            if (!dateStr) { alert("⚠️ 請選擇補登日期！"); return; }
            
            const dateTimeStr = `${dateStr}T${hour}:${min}`;
            const serviceType = document.getElementById('manualService').value;
            const checkType = document.querySelector('input[name="manualCheckType"]:checked').value;
            const multiplier = document.getElementById('manualMultiplier').value;
            const remark = document.getElementById('manualRemark').value;

            const btn = event.target;
            btn.disabled = true; btn.innerText = "資料驗證中 ⏳...";

            fetch(GAS_URL, {
                method: "POST", headers: { "Content-Type": "text/plain;charset=utf-8" },
                body: JSON.stringify({ 
                    action: "manualEntry", userId: currentUserId, targetUserId: targetUserId, volunteerName: volunteerName,
                    dateTimeStr: dateTimeStr, checkType: checkType, serviceType: serviceType, multiplier: multiplier, remark: remark
                })
            }).then(res => res.json()).then(result => {
                if(result.status === "success") {
                    alert("✅ " + result.message);
                    switchSection(document.getElementById('sectionAdmin'));
                    fetchPendingRecords(); // 成功後自動回到館員首頁並重整資料
                } else {
                    alert("❌ 補登失敗\n" + result.message); // 防呆邏輯發動，跳出警告
                }
                btn.disabled = false; btn.innerText = "✅ 確認補登";
            }).catch(err => {
                alert("網路異常，補登失敗：" + err.message);
                btn.disabled = false; btn.innerText = "✅ 確認補登";
            });
        }

        // ==========================================
        // 📍 動態渲染「服務內容」與「文化時數開關」控制
        // ==========================================
        function buildDynamicServiceOptions() {
            const optionsHtml = `
                <option value="活動支援">活動支援</option>
                <option value="五感值班">五感值班</option>
                <option value="創客值班">創客值班</option>
                <option value="導覽">導覽</option>
                ${isCulturalHoursEnabled ? '<option value="文化時數">文化時數</option>' : ''}
            `;

            // 更新志工打卡選單
            const serviceSelect = document.getElementById('serviceSelect');
            if (serviceSelect) {
                const currentVal = serviceSelect.value;
                serviceSelect.innerHTML = optionsHtml;
                if (serviceSelect.querySelector(`option[value="${currentVal}"]`)) serviceSelect.value = currentVal;
            }

            // 更新館員補登選單
            const manualSelect = document.getElementById('manualService');
            if (manualSelect) {
                const currentManualVal = manualSelect.value;
                manualSelect.innerHTML = optionsHtml;
                if (manualSelect.querySelector(`option[value="${currentManualVal}"]`)) manualSelect.value = currentManualVal;
            }

            // 更新館員開關按鈕的外觀
            const btn = document.getElementById('btnToggleCultural');
            if (btn) {
                if (isCulturalHoursEnabled) {
                    btn.innerText = "🛑 關閉文化時數";
                    btn.style.background = "#ffebee";
                    btn.style.color = "#c62828";
                } else {
                    btn.innerText = "🎭 開放文化時數";
                    btn.style.background = "#f3e5f5";
                    btn.style.color = "#8e24aa";
                }
            }
        }

        function toggleCulturalMode() {
            const newState = !isCulturalHoursEnabled;
            const btn = document.getElementById('btnToggleCultural');
            btn.innerText = "處理中 ⏳...";
            
            fetch(GAS_URL, {
                method: "POST", headers: { "Content-Type": "text/plain;charset=utf-8" },
                body: JSON.stringify({ action: "toggleCulturalHours", userId: currentUserId, enable: newState })
            }).then(res => res.json()).then(result => {
                if(result.status === "success") {
                    isCulturalHoursEnabled = result.newState;
                    buildDynamicServiceOptions(); // 重新繪製選單與按鈕
                    alert(isCulturalHoursEnabled ? "✅ 已開放「文化時數」！全館志工現在可以看見此選項了。" : "🚫 已關閉「文化時數」！");
                } else {
                    alert("權限不足或操作失敗：" + result.message);
                    buildDynamicServiceOptions(); 
                }
            }).catch(err => {
                alert("網路異常：" + err.message);
                buildDynamicServiceOptions();
            });
        }

        // ==========================================
        // 📍 館員批次審核邏輯
        // ==========================================
        let isBatchMode = false;

        function toggleBatchMode() {
            isBatchMode = !isBatchMode;
            const btn = document.getElementById('btnBatchMode');
            const checkboxes = document.querySelectorAll('.batch-checkbox');
            const individualBtns = document.querySelectorAll('.approve-btn');
            const submitBatchBtn = document.getElementById('submitBatchBtn');

            if (isBatchMode) {
                // 開啟批次模式
                btn.innerText = "❌ 退出批次";
                btn.style.background = "#ffebee";
                btn.style.color = "#c62828";
                checkboxes.forEach(cb => { cb.style.display = 'inline-block'; cb.checked = false; });
                individualBtns.forEach(b => b.style.display = 'none'); // 隱藏單筆按鈕
                submitBatchBtn.style.display = 'block'; // 顯示大按鈕
                updateBatchCount();
            } else {
                // 關閉批次模式
                btn.innerText = "☑️ 批次審核";
                btn.style.background = "#e3f2fd";
                btn.style.color = "#1565c0";
                checkboxes.forEach(cb => cb.style.display = 'none');
                individualBtns.forEach(b => b.style.display = 'block'); // 恢復單筆按鈕
                submitBatchBtn.style.display = 'none'; // 隱藏大按鈕
            }
        }

        // 點擊卡片標題也可以勾選
        function toggleCardCheckbox(uuid, event) {
            if (!isBatchMode) return;
            if (event.target.tagName.toLowerCase() === 'input') return; // 避免重複觸發
            const cb = document.getElementById(`cb_${uuid}`);
            if (cb) {
                cb.checked = !cb.checked;
                updateBatchCount();
            }
        }

        // 更新已選取數量
        function updateBatchCount() {
            const count = document.querySelectorAll('.batch-checkbox:checked').length;
            const btn = document.getElementById('submitBatchBtn');
            btn.innerText = `✅ 送出批次核准 (已選 ${count} 筆)`;
            if(count > 0) {
                btn.style.background = "#00B900";
                btn.disabled = false;
            } else {
                btn.style.background = "#ccc";
                btn.disabled = true;
            }
        }

        // 執行批次送出
        function submitBatchApprove() {
            const checkboxes = document.querySelectorAll('.batch-checkbox:checked');
            if (checkboxes.length === 0) return;

            const records = [];
            checkboxes.forEach(cb => {
                const uuid = cb.value;
                const hourSelect = document.getElementById(`hour_${uuid}`);
                const minSelect = document.getElementById(`min_${uuid}`);
                const datePart = hourSelect.getAttribute('data-date'); 
                const newTime = `${datePart}T${hourSelect.value}:${minSelect.value}`;
                
                // 簽退紀錄沒有加權欄位，預設給 1
                const mulInput = document.getElementById(`mul_${uuid}`);
                const multiplier = mulInput ? mulInput.value : 1; 
                const remark = document.getElementById(`rem_${uuid}`).value;

                records.push({ uuid, newTime, multiplier, remark });
            });

            const btn = document.getElementById('submitBatchBtn');
            btn.disabled = true; btn.innerText = "批次處理中 ⏳...";

            fetch(GAS_URL, {
                method: "POST", headers: { "Content-Type": "text/plain;charset=utf-8" },
                body: JSON.stringify({ 
                    action: "batchApprove", userId: currentUserId, records: records, staffName: dbUserName
                })
            }).then(res => res.json()).then(result => {
                if(result.status === "success") {
                    alert(result.message);
                    toggleBatchMode(); // 自動關閉批次模式
                    fetchPendingRecords(); // 重新整理清單
                } else {
                    alert("批次核准失敗：" + result.message);
                    btn.disabled = false; btn.innerText = `✅ 送出批次核准 (已選 ${checkboxes.length} 筆)`;
                }
            }).catch(err => {
                alert("網路異常：" + err.message);
                btn.disabled = false; btn.innerText = `✅ 送出批次核准 (已選 ${checkboxes.length} 筆)`;
            });
        }
        
    </script>
</body>
</html>
